services:
  - type: web
    name: resume-builder-api
    env: node
    plan: free           # upgrade to Starter ($7/mo) for always-on
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false       # set manually in Render dashboard
